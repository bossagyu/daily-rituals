<div class="mockup" style="max-width:400px;margin:0 auto;">
  <div class="mockup-header">設定ページ - モバイル表示</div>

    <!-- Settings list -->

  </div>
  <div class="option" data-choice="adjust" onclick="toggleSelect(this)">

    </div>
  </div>
