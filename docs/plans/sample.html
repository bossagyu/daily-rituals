<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #a78bfa;
    --accent2: #f472b6;
    --accent3: #34d399;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header { margin-bottom: 48px; }
  .header-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: 0.8;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 400;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .date-display {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: rgba(167,139,250,0.2); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.6;
  }
  .stat-card:nth-child(2)::before { background: var(--accent2); }
  .stat-card:nth-child(3)::before { background: var(--accent3); }
  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    display: block;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 20px;
    color: var(--accent);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .add-btn:hover { background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.4); transform: translateY(-1px); }
  .habits-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
  .habit-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .habit-item:hover { border-color: rgba(255,255,255,0.12); transform: translateX(4px); }
  .habit-item.completed { border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.04); }
  .habit-item.completed::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(52,211,153,0.05), transparent);
    pointer-events: none;
  }
  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .habit-item.completed .check-circle {
    background: var(--accent3);
    border-color: var(--accent3);
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(52,211,153,0.3);
  }
  .check-icon { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; }
  .habit-item.completed .check-icon { opacity: 1; }
  .habit-emoji { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }
  .habit-item.completed .habit-name { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--accent3); }
  .habit-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .streak-badge { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 3px; }
  .habit-category { font-size: 10px; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.05em; font-weight: 500; }
  .delete-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0;
    flex-shrink: 0;
  }
  .habit-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(248,113,113,0.15); color: var(--danger); }
  .weekly-grid {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 36px;
  }
  .weekly-title { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  .day-labels { display: grid; grid-template-columns: 1fr repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
  .day-label { font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 0.05em; }
  .weekly-rows { display: flex; flex-direction: column; gap: 6px; }
  .weekly-row { display: grid; grid-template-columns: 1fr repeat(7, 1fr); gap: 6px; align-items: center; }
  .weekly-habit-name { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
  .day-dot {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.2s;
    min-height: 22px;
  }
  .day-dot.done { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(167,139,250,0.4); }
  .day-dot.today { border-color: rgba(167,139,250,0.4); }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 24px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 24px; color: var(--text); }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: rgba(167,139,250,0.4); }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .emoji-btn {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
  }
  .emoji-btn:hover { border-color: var(--accent); transform: scale(1.1); }
  .emoji-btn.selected { border-color: var(--accent); background: rgba(167,139,250,0.15); }
  .category-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .category-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .category-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .category-btn.selected { background: rgba(167,139,250,0.15); border-color: var(--accent); color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 28px; }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { background: var(--surface2); color: var(--text); }
  .btn-save {
    flex: 2;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(167,139,250,0.3); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px 24px;
    font-size: 13px;
    color: var(--text);
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @keyframes celebrate { 0% { transform: scale(1); } 30% { transform: scale(1.08); } 100% { transform: scale(1); } }
  .habit-item.celebrating { animation: celebrate 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-label">Daily Rituals</div>
    <h1>習慣トラッカー</h1>
    <div class="date-display" id="dateDisplay"></div>
  </header>
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-number" id="totalHabits">0</span>
      <div class="stat-label">習慣数</div>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="completedToday">0</span>
      <div class="stat-label">本日完了</div>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="bestStreak">0</span>
      <div class="stat-label">最長継続</div>
    </div>
  </div>
  <div class="section-header">
    <span class="section-title">今日の習慣</span>
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      追加
    </button>
  </div>
  <div class="habits-list" id="habitsList"></div>
  <div class="weekly-grid">
    <div class="weekly-title">週間記録</div>
    <div class="day-labels">
      <div></div>
      <div class="day-label">月</div>
      <div class="day-label">火</div>
      <div class="day-label">水</div>
      <div class="day-label">木</div>
      <div class="day-label">金</div>
      <div class="day-label">土</div>
      <div class="day-label">日</div>
    </div>
    <div class="weekly-rows" id="weeklyRows"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>新しい習慣</h2>
    <div class="form-group">
      <label class="form-label">習慣の名前</label>
      <input type="text" class="form-input" id="habitNameInput" placeholder="例：毎日30分読書" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveHabit()">追加する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const EMOJIS = ['📚','🏃','🧘','💪','✍️','🎵','🎨','🥗','💧','😴','🧹','🌱','🧠','💻','🎯','🏊','🚴','🧶','🎮','🌅'];
  const CATEGORIES = [
    { name: '健康', color: '#34d399', bg: 'rgba(52,211,153,0.1)' },
    { name: '学習', color: '#60a5fa', bg: 'rgba(96,165,250,0.1)' },
    { name: '運動', color: '#f472b6', bg: 'rgba(244,114,182,0.1)' },
    { name: '趣味', color: '#fbbf24', bg: 'rgba(251,191,36,0.1)' },
    { name: 'その他', color: '#a78bfa', bg: 'rgba(167,139,250,0.1)' },
  ];

  let habits = JSON.parse(localStorage.getItem('habits_v2') || '[]');
  let selectedEmoji = '📚';
  let selectedCategory = 'その他';

  const todayKey = () => new Date().toISOString().slice(0, 10);
  const dayKey = (offset) => {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0, 10);
  };

  function save() { localStorage.setItem('habits_v2', JSON.stringify(habits)); }

  function getStreak(habit) {
    let streak = 0;
    const d = new Date();
    while (true) {
      const k = d.toISOString().slice(0, 10);
      if (habit.completedDays && habit.completedDays[k]) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return streak;
  }

  function getBestStreak() {
    if (!habits.length) return 0;
    return Math.max(...habits.map(h => getStreak(h)));
  }

  function updateStats() {
    const today = todayKey();
    const completed = habits.filter(h => h.completedDays && h.completedDays[today]).length;
    document.getElementById('totalHabits').textContent = habits.length;
    document.getElementById('completedToday').textContent = completed;
    document.getElementById('bestStreak').textContent = getBestStreak();
  }

  function renderHabits() {
    const list = document.getElementById('habitsList');
    const today = todayKey();
    if (!habits.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-emoji">✨</div><div class="empty-text">まだ習慣がありません<br>右上の「追加」から始めましょう</div></div>`;
      updateStats();
      renderWeekly();
      return;
    }
    list.innerHTML = habits.map((h, i) => {
      const done = h.completedDays && h.completedDays[today];
      const streak = getStreak(h);
      const cat = CATEGORIES.find(c => c.name === h.category) || CATEGORIES[4];
      return `
        <div class="habit-item ${done ? 'completed' : ''}" id="habit-${i}" onclick="toggleHabit(${i})">
          <div class="check-circle">
            <svg class="check-icon" viewBox="0 0 14 14" fill="none">
              <path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="habit-emoji">${h.emoji}</div>
          <div class="habit-info">
            <div class="habit-name">${h.name}</div>
            <div class="habit-meta">
              ${streak > 0 ? `<span class="streak-badge">🔥 ${streak}日</span>` : ''}
              <span class="habit-category" style="color:${cat.color};background:${cat.bg}">${h.category}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteHabit(event, ${i})" title="削除">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>`;
    }).join('');
    updateStats();
    renderWeekly();
  }

  function renderWeekly() {
    const rows = document.getElementById('weeklyRows');
    if (!habits.length) { rows.innerHTML = ''; return; }
    const today = new Date();
    const dow = today.getDay();
    const mondayOffset = dow === 0 ? -6 : 1 - dow;
    rows.innerHTML = habits.map(h => {
      const dots = Array.from({length: 7}, (_, i) => {
        const key = dayKey(mondayOffset + i);
        const done = h.completedDays && h.completedDays[key];
        const isToday = key === todayKey();
        return `<div class="day-dot ${done ? 'done' : ''} ${isToday ? 'today' : ''}"></div>`;
      }).join('');
      return `<div class="weekly-row"><div class="weekly-habit-name">${h.emoji} ${h.name}</div>${dots}</div>`;
    }).join('');
  }

  function toggleHabit(i) {
    const today = todayKey();
    if (!habits[i].completedDays) habits[i].completedDays = {};
    const wasDone = habits[i].completedDays[today];
    habits[i].completedDays[today] = !wasDone;
    save();
    if (!wasDone) showToast(habits[i].emoji + ' 達成！おめでとうございます！');
    renderHabits();
  }

  function deleteHabit(e, i) {
    e.stopPropagation();
    habits.splice(i, 1);
    save();
    renderHabits();
    showToast('習慣を削除しました');
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('habitNameInput').value = '';
    selectedEmoji = '📚';
    selectedCategory = 'その他';
    renderEmojiGrid();
    renderCategoryGrid();
    setTimeout(() => document.getElementById('habitNameInput').focus(), 300);
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function renderEmojiGrid() {
    document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e =>
      `<button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>`
    ).join('');
  }

  function renderCategoryGrid() {
    document.getElementById('categoryGrid').innerHTML = CATEGORIES.map(c =>
      `<button class="category-btn ${c.name === selectedCategory ? 'selected' : ''}" onclick="selectCategory('${c.name}')">${c.name}</button>`
    ).join('');
  }

  function selectEmoji(e) { selectedEmoji = e; renderEmojiGrid(); }
  function selectCategory(c) { selectedCategory = c; renderCategoryGrid(); }

  function saveHabit() {
    const name = document.getElementById('habitNameInput').value.trim();
    if (!name) {
      const inp = document.getElementById('habitNameInput');
      inp.focus();
      inp.style.borderColor = 'var(--danger)';
      setTimeout(() => inp.style.borderColor = '', 1000);
      return;
    }
    habits.push({ name, emoji: selectedEmoji, category: selectedCategory, completedDays: {}, createdAt: Date.now() });
    save();
    closeModal();
    renderHabits();
    showToast('新しい習慣を追加しました！');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('habitNameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveHabit();
  });

  renderHabits();
</script>
</body>
</html>
